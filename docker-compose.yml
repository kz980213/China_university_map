version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: china-university-map-postgres
    environment:
      POSTGRES_DB: china_university_map
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: china-university-map-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: