services:
  - type: web
    name: china-university-map-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    # --workers 1: 免费套餐 512MB，多 worker 会成倍放大内存占用
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --no-access-log
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      # Render 平台自动注入 RENDER=true，database.py 据此启用 NullPool
